name: Run Postman Collection

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  api-tests:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the code from the repository
      - name: Check out repo
        uses: actions/checkout@v4

      # Step 2: Set up Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Step 3: Install Newman globally via npm
      - name: Install Newman
        run: npm install -g newman

      # Step 4: Run the exported Postman collection
      - name: Run Postman Collection
        run: |
          newman run ./MyMiniCollection.postman_collection.json -e ./MiniPostman1.postman_environment.json
